name: Deploy Frontend to AWS Lightsail

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Create .env file
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env
          echo "VITE_API_VERSION=/v1" >> .env
          echo "VITE_API_TIMEOUT=10000" >> .env
          echo "VITE_API_REFRESH_TIMEOUT=5000" >> .env
          echo "VITE_ACCESS_TOKEN_KEY=${{ secrets.VITE_ACCESS_TOKEN_KEY }}" >> .env
          echo "VITE_REFRESH_TOKEN_KEY=${{ secrets.VITE_REFRESH_TOKEN_KEY }}" >> .env
          echo "VITE_APP_NAME=${{ secrets.VITE_APP_NAME }}" >> .env
          echo "VITE_APP_VERSION=1.0.0" >> .env
          echo "VITE_ENABLE_DEV_TOOLS=false" >> .env
          echo "VITE_DISABLE_AUTH_GUARD=false" >> .env

      - name: Build frontend
        run: NODE_OPTIONS="--max-old-space-size=4096" pnpm run build

      - name: Deploy dist to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "~/ncbrand-frontend/"
          strip_components: 0
          overwrite: true
          rm: false

      - name: Set permissions and reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chmod -R 755 ~/ncbrand-frontend/dist
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Frontend deployed and nginx reloaded!"
